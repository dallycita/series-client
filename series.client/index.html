<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Series Tracker</h1>
        <button id="btn-new">+ Nueva serie</button>
    </header>

    <main>
        <div class="toolbar">
            <input type="text" id="search-input" placeholder="Buscar serie...">
            <select id="sort-select">
                <option value="created_at-desc">Más recientes</option>
                <option value="title-asc">Título A-Z</option>
                <option value="title-desc">Título Z-A</option>
                <option value="year-desc">Año (nuevo primero)</option>
                <option value="year-asc">Año (antiguo primero)</option>
            </select>
            <button id="btn-csv">Exportar CSV</button>
            <button id="btn-xlsx">Exportar Excel</button>
        </div>

        <div id="series-grid"></div>
        <div id="pagination"></div>
    </main>

    <!-- Modal crear/editar -->
    <div id="modal" class="hidden">
        <div class="modal-box">
            <h2 id="modal-title">Nueva serie</h2>
            <button id="modal-close">✕</button>
            <form id="series-form">
                <input type="hidden" id="form-id">
                <input type="text" id="form-title" placeholder="Título *" required>
                <input type="text" id="form-genre" placeholder="Género">
                <select id="form-status">
                    <option value="pendiente">Pendiente</option>
                    <option value="viendo">Viendo</option>
                    <option value="completada">Completada</option>
                    <option value="abandonada">Abandonada</option>
                </select>
                <input type="number" id="form-year" placeholder="Año" min="1900" max="2100">
                <textarea id="form-synopsis" placeholder="Sinopsis"></textarea>
                <input type="file" id="form-image" accept="image/jpeg,image/png,image/webp">
                <button type="submit">Guardar</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
